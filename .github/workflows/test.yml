name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Classify pull request changes
        if: github.event_name == 'pull_request'
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/classify-plan-only.ts

      - name: Run plan checks
        if: github.event_name == 'pull_request' && steps.changes.outputs.plan_only == 'true'
        run: make check-plan

      - name: Run full checks
        if: github.event_name != 'pull_request' || steps.changes.outputs.plan_only != 'true'
        run: pnpm check:ci
